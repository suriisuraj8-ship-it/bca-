<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCA Students App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #fff8f0, #fdf5e6); /* smooth cream background */
    }

    .welcome-section {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 20vh;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: white;
        font-size: clamp(28px, 6vw, 40px);
        font-weight: bold;
        text-align: center;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
    }

    .button-container {
        display: flex;
        flex-direction: column;
        gap: 25px;
        width: 90%;
        max-width: 360px;
        margin: 20px auto;
    }

    button {
        padding: 16px;
        font-size: clamp(16px, 4vw, 20px);
        font-weight: bold;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button span {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
    }

    button small {
        font-size: 12px;
        color: #fff;
        text-align: center;
    }

    button:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    }

    #createTable { background-color: #3498db; }
    #livePrice { background-color: #27ae60; }
    #shopping { background-color: #f39c12; }
    #youtube { background-color: #c4302b; }

    .footer {
        background-color: #000;
        color: white;
        padding: 40px 15px;
        text-align: center;
    }

    .footer h2 {
        margin-bottom: 15px;
        font-size: clamp(20px, 5vw, 28px);
    }

    .footer p {
        margin-bottom: 25px;
        font-size: clamp(14px, 4vw, 18px);
        line-height: 1.5;
    }

    .footer-images {
        display: flex;
        gap: 15px;
        overflow-x: auto;
        padding-bottom: 10px;
        justify-content: center;
    }

    .footer-images img {
        width: 160px;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        flex-shrink: 0;
        transition: transform 0.3s ease;
        cursor: pointer;
    }

    .footer-images img:hover {
        transform: scale(1.05);
    }

    .footer a {
        color: #f39c12;
        text-decoration: none;
    }

    .footer a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="welcome-section">
    BCA Students
</div>

<div class="button-container">
    <button id="createTable">
        <span><i class="fas fa-table"></i> Create Table</span>
        <small>Make and export your own editable tables</small>
    </button>

    <button id="livePrice"><span><i class="fas fa-chart-line"></i> Live Trading Price</span></button>

    <button id="shopping"><span><i class="fas fa-shopping-cart"></i> Shopping Websites</span></button>

    <button id="youtube">
        <span><i class="fab fa-youtube"></i> Download</span>
        <small>Click to open the site and enter video URL to download</small>
    </button>
</div>

<div class="footer">
    <h2>About the Founder of apk </h2>
    <p>Created by Suraj Hattarakal, guru, and praveen.
        This apk is only for educational purposes.
    </p>
    <p>Contact: email — suriisuraj7@gmail.com</p>
    <p>📍Address — Vijayapur Road, Sindagi</p>
    <div class="footer-images">
        <img src="C:/Users/Dell/Desktop/new_file/images/one.png" alt="Image One">
        <img src="C:/Users/Dell/Desktop/new_file/images/two.png" alt="Image Two">
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("createTable").addEventListener("click", function() {
        window.location.href = "table_export.html";
    });

    document.getElementById("livePrice").addEventListener("click", function() {
        window.location.href = "liveprice.html";
    });

    document.getElementById("shopping").addEventListener("click", function() {
        window.location.href = "shopping.html";
    });

    document.getElementById("youtube").addEventListener("click", function() {
        window.location.href = "youtube_download.html";
    });
});
</script>

</body>
</html>
