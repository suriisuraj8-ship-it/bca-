<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Trade Demo</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a237e, #283593, #3f51b5);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

h1 {
    margin: 20px 0;
    text-align: center;
    font-size: 28px;
    color: #ffeb3b;
}

#adBanner {
    width: 320px;
    height: 50px;
    background-color: #f1c40f;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border-radius: 8px;
    margin-bottom: 20px;
}

#buttonsContainer {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    justify-items: center;
    margin-top: 20px;
}

button {
    background: #ff9800;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 18px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    width: 200px;
}

button:hover {
    background: #f57c00;
    transform: scale(1.05);
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    background: #000;
    width: 95%;
    max-width: 450px;
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    display: flex;
    flex-direction: column;
    gap: 15px;
    max-height: 80vh;
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 22px;
    font-weight: bold;
}

.close-btn {
    cursor: pointer;
    font-size: 28px;
    color: #e74c3c;
}

.modal-body p {
    font-size: 16px;
    line-height: 1.6;
}

.share-price {
    color: #00ff00;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>Live Trade & Market News</h1>

<!-- Banner Ad Placeholder -->
<div id="adBanner">Banner Ad Here</div>

<div id="buttonsContainer">
    <button data-company="Zomato">Zomato</button>
    <button data-company="Reliance">Reliance</button>
    <button data-company="Tata">Tata</button>
    <button data-company="Jio">Jio</button>
    <button data-company="Infosys">Infosys</button>
    <button data-company="Apple">Apple</button>
    <button data-company="Swiggy">Swiggy</button>
    <button data-company="HDFC Bank">HDFC Bank</button>
    <button data-company="Tesla">Tesla</button>
    <button data-company="Bitcoin">Bitcoin</button>
    <button data-company="Gold">Gold</button>
    <button data-company="Silver">Silver</button>
</div>

<!-- Modal -->
<div id="newsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle"></span>
            <span class="close-btn" id="closeModal">&times;</span>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
const modal = document.getElementById("newsModal");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");
const closeModal = document.getElementById("closeModal");

const companyNews = {
    "Zomato": { price: "₹84.50", news: [
        "Zomato shares opened today strong with steady buying interest.",
        "Investors are optimistic as the company expands its food delivery services.",
        "Today's share price: <span class='share-price'>₹84.50</span>",
        "Analysts suggest holding for potential long-term growth, focusing on urban markets."
    ]},
    "Reliance": { price: "₹2450.75", news: [
        "Reliance Industries shows consistent growth across energy and retail sectors.",
        "New investments in renewable energy increase investor confidence.",
        "Today's share price: <span class='share-price'>₹2450.75</span>",
        "Analysts recommend long-term hold with a focus on strategic diversification."
    ]},
    // ... other companies remain same
    "Tata": { price: "₹1120.30", news: ["Tata Group companies performing steadily.", "Strong auto and tech division earnings.", "Today's share price: <span class='share-price'>₹1120.30</span>", "Monitor global market impacts."]},
    "Jio": { price: "₹420.60", news: ["Reliance Jio gains momentum.", "Subscriber growth boosts sentiment.", "Today's share price: <span class='share-price'>₹420.60</span>", "Long-term growth outlook is positive."]},
    "Infosys": { price: "₹1530.25", news: ["Strong quarterly earnings.", "Global demand for digital transformation.", "Today's share price: <span class='share-price'>₹1530.25</span>", "Watch for tech sector fluctuations."]},
    "Apple": { price: "$175.60", news: ["Apple stock shows stability.", "New product launches drive optimism.", "Today's share price: <span class='share-price'>$175.60</span>", "Experts suggest holding."]},
    "Swiggy": { price: "₹140.20", news: ["Swiggy expands delivery services.", "User engagement increases.", "Today's share price: <span class='share-price'>₹140.20</span>", "Potential for medium-term growth."]},
    "HDFC Bank": { price: "₹1635.50", news: ["Strong Q2 earnings.", "Loan growth remains stable.", "Today's share price: <span class='share-price'>₹1635.50</span>", "Consistent returns expected."]},
    "Tesla": { price: "$760.40", news: ["Positive EV market expansion.", "Record deliveries reported.", "Today's share price: <span class='share-price'>$760.40</span>", "Long-term growth strong."]},
    "Bitcoin": { price: "$29450.80", news: ["Renewed interest from investors.", "Market volatility high.", "Today's BTC price: <span class='share-price'>$29450.80</span>", "Trade carefully with risk management."]},
    "Gold": { price: "₹1,34,950.00", news: ["Gold prices reach high.", "Investors flock to safe-haven.", "Today's gold price: <span class='share-price'>₹1,34,950.00</span> per 10 grams.", "Demand surges during Dhanteras."]},
    "Silver": { price: "₹1,85,000.00", news: ["Silver prices surge.", "Attractive investment option.", "Today's silver price: <span class='share-price'>₹1,85,000.00</span> per kilogram.", "Monitor market trends."]}
};

document.querySelectorAll("#buttonsContainer button").forEach(btn => {
    btn.addEventListener("click", () => {
        const company = btn.getAttribute("data-company");
        const info = companyNews[company];
        if(info){
            modalTitle.innerHTML = company + " News";
            modalBody.innerHTML = info.news.map(p => `<p>${p}</p>`).join('');
            modal.style.display = "flex";
        }
    });
});

closeModal.addEventListener("click", () => { modal.style.display = "none"; });
window.addEventListener("click", (e) => { if(e.target === modal) modal.style.display = "none"; });
</script>

</body>
</html>
