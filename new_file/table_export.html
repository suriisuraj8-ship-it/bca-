<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Custom Table</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff8f0, #fdf5e6);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}
h1 {
    color: #2c3e50;
    margin-bottom: 20px;
    text-align: center;
}
table {
    border-collapse: collapse;
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    background-color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}
th {
    background-color: #f4a261;
    color: white;
}
td input {
    width: 100%;
    border: none;
    outline: none;
    text-align: center;
}
button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background-color: #2c3e50;
    color: white;
    transition: 0.3s;
}
button:hover {
    background-color: #1a252f;
}
.footer {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
    text-align: center;
}
</style>
</head>
<body>

<script>
// 🚫 Mobile-only restriction
document.addEventListener("DOMContentLoaded", function() {
    const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent);
    if (!isMobile) {
        document.body.innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                        height:100vh;text-align:center;background:#f9f9f9;color:#333;font-family:sans-serif;">
                <h2>⚠️ Mobile Only</h2>
                <p>This page can only be accessed on a mobile device.</p>
                <p>Please open this page using your phone or tablet.</p>
            </div>`;
    }
});
</script>

<h1>Create Your Custom Table</h1>

<div style="text-align:center;">
    <button id="addRow">Add Row</button>
    <button id="addColumn">Add Column</button>
    <button id="removeRow">Remove Last Row</button>
    <button id="downloadPNG">Download PNG</button>
    <button id="downloadPDF">Download PDF</button>
</div>

<table id="customTable">
    <thead>
        <tr>
            <th>Sr</th>
            <th>Item</th>
            <th>Description</th>
            <th>Qty</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td contenteditable="true">Item 1</td>
            <td contenteditable="true">Description 1</td>
            <td contenteditable="true">1</td>
            <td contenteditable="true">100</td>
        </tr>
    </tbody>
</table>

<div class="footer">
    Created by <strong>surajtable.com</strong>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const table = document.getElementById("customTable");
const addRowBtn = document.getElementById("addRow");
const addColumnBtn = document.getElementById("addColumn");
const removeRowBtn = document.getElementById("removeRow");
const downloadPNGBtn = document.getElementById("downloadPNG");
const downloadPDFBtn = document.getElementById("downloadPDF");

// Add row
addRowBtn.addEventListener("click", () => {
    const row = table.insertRow();
    const columns = table.rows[0].cells.length;
    for (let i = 0; i < columns; i++) {
        const cell = row.insertCell();
        if (i === 0) cell.textContent = table.rows.length - 1;
        else cell.contentEditable = "true";
    }
});

// Add column
addColumnBtn.addEventListener("click", () => {
    const header = prompt("Enter column name:");
    if (!header) return;
    const th = document.createElement("th");
    th.textContent = header;
    table.rows[0].appendChild(th);
    for (let i = 1; i < table.rows.length; i++) {
        const cell = table.rows[i].insertCell();
        cell.contentEditable = "true";
    }
});

// Remove last row
removeRowBtn.addEventListener("click", () => {
    const rowCount = table.rows.length;
    if (rowCount > 2) table.deleteRow(rowCount - 1);
});

// Download PNG
downloadPNGBtn.addEventListener("click", () => {
    html2canvas(document.querySelector("table")).then(canvas => {
        const link = document.createElement("a");
        link.download = "table_surajtable.png";
        link.href = canvas.toDataURL();
        link.click();
    });
});

// Download PDF
downloadPDFBtn.addEventListener("click", () => {
    html2canvas(document.querySelector("table")).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        const width = pdf.internal.pageSize.getWidth();
        const height = (canvas.height * width) / canvas.width;
        pdf.addImage(imgData, "PNG", 0, 0, width, height);
        pdf.setFontSize(10);
        pdf.text("Created by surajtable.com", 10, height + 10);
        pdf.save("table_surajtable.pdf");
    });
});
</script>

</body>
</html>
