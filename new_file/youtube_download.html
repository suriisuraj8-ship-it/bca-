<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}

h1 {
    color: #c4302b;
    margin-bottom: 20px;
    text-align: center;
}

button {
    padding: 16px 25px;
    font-size: 18px;
    background-color: #c4302b;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    margin-bottom: 25px;
}

button:hover {
    background-color: #a72821;
}

p {
    max-width: 800px;
    line-height: 1.6;
    text-align: justify;
    margin-bottom: 15px;
}

/* Banner Ad Placeholder */
#adBanner {
    width: 320px;
    height: 50px;
    background-color: #f1c40f;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border-radius: 8px;
    margin-bottom: 25px;
}
</style>
</head>
<body>

<h1>YouTube Video Downloader</h1>

<!-- Banner Ad Placeholder -->
<div id="adBanner">Banner Ad Here</div>

<!-- Download Button -->
<a href="https://transkriptor.com/youtube-video-downloader/" target="_blank">
    <button>Click Here to Download</button>
</a>

<p>Click the above button ☝️</p>
<p>Paste the video link from YouTube</p>
<p>Scroll and click download</p>
<p>Click on download from the pop box</p>
<p>Now click on ⋮</p>
<p>There you find the final download button</p>

</body>
</html>
